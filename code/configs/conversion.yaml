model:
  model_type: "standard"
  in_channels: 12
  num_classes: 6
  base_channels: 16
  use_se: true

export:
  input_shape: [1, 12, 24, 6]
  checkpoint: "checkpoints/neurogrip_best.ckpt"
  output: "models/neurogrip"

quantize:
  enabled: false
  bit_num: 8
