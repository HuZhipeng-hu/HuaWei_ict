# ============================================
# NeuroGrip Pro V2 — 训练配置
# ============================================

# 模型架构
model:
  model_type: "standard"    # "standard" 或 "lite"
  in_channels: 6            # EMG 通道数（使用前6通道）
  num_classes: 6            # 手势类别数
  base_channels: 16         # 基础通道宽度
  use_se: true              # SE 注意力
  dropout_rate: 0.3         # Dropout

# 信号预处理
preprocess:
  sampling_rate: 200.0      # 目标采样率 (Hz)
  num_channels: 6           # 使用的 EMG 通道数
  total_channels: 8         # 设备总通道数（CSV 中 emg1~emg8）
  device_sampling_rate: 1000 # 设备原始采样率 (Hz)
  lowcut: 20.0              # 带通滤波下截止 (Hz)
  highcut: 90.0             # 带通滤波上截止 (Hz)
  filter_order: 4           # 滤波器阶数
  stft_window_size: 24      # STFT 窗口大小
  stft_hop_size: 12         # STFT 步长
  stft_n_fft: 46            # FFT 点数
  segment_length: 84        # 训练样本长度 (200Hz × 0.42s)
  segment_stride: 42         # 样本间步长 (50% 重叠)

# 训练超参数
training:
  epochs: 80                # 训练轮数（小数据集多训几轮）
  batch_size: 16            # 批大小（小数据集用小 batch 效果更好）
  learning_rate: 0.001      # 初始学习率
  weight_decay: 0.0001      # 权重衰减
  lr_scheduler: "cosine"    # "step" 或 "cosine"
  warmup_epochs: 3          # 预热轮数
  lr_step_size: 10          # StepLR 步长
  lr_gamma: 0.5             # StepLR 衰减因子
  gradient_clip: 1.0        # 梯度裁剪
  label_smoothing: 0.1      # 标签平滑系数 (0=关闭)
  early_stop_patience: 12   # 早停耐心值（配合更多 epochs）
  val_ratio: 0.2            # 验证集占比
  kfold: 0                  # K-Fold 折数 (0=普通训练, 5=5折交叉验证)
  device: "Ascend"          # "CPU" / "GPU" / "Ascend"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# 数据增强
augmentation:
  enabled: true
  time_warp_rate: 0.1       # 时间扭曲 ±10%
  amplitude_scale: 0.15     # 幅度缩放 ±15%
  noise_std: 0.05           # 高斯噪声标准差
  augment_factor: 5         # 增强倍数（小数据集建议 ≥5）
  use_mixup: true           # Mixup 增强
  mixup_alpha: 0.2          # Mixup Beta 分布参数

