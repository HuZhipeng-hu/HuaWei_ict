# ============================================
# NeuroGrip - Training Config
# ============================================

model:
  model_type: "standard"
  in_channels: 12
  num_classes: 6
  base_channels: 16
  use_se: true
  dropout_rate: 0.4

preprocess:
  sampling_rate: 200.0
  num_channels: 6
  total_channels: 8
  device_sampling_rate: 1000
  lowcut: 20.0
  highcut: 90.0
  filter_order: 4
  stft_window_size: 24
  stft_hop_size: 12
  stft_n_fft: 46
  segment_length: 84
  segment_stride: 42
  dual_branch:
    enabled: true
    fuse_mode: "concat_channels"
    low_rate: 200
    high_rate: 1000
    high_segment_length: 420
    high_segment_stride: 210
    high_stft_window_size: 120
    high_stft_hop_size: 60
    high_stft_n_fft: 230
    high_freq_bins_out: 24
    multi_phase_offsets: [0.0, 0.33, 0.66]

training:
  epochs: 80
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0003
  lr_scheduler: "cosine"
  warmup_epochs: 3
  lr_step_size: 10
  lr_gamma: 0.5
  gradient_clip: 1.0
  label_smoothing: 0.05
  early_stop_patience: 12
  val_ratio: 0.2
  test_ratio: 0.2
  split_mode: "grouped_file"
  split_manifest_path: "artifacts/splits/default_split_manifest.json"
  split_seed: 42
  kfold: 0
  device: "Ascend"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# Canonical split config namespace (kept separate for clarity)
data:
  split_mode: "grouped_file"
  test_ratio: 0.2
  split_manifest_path: "artifacts/splits/default_split_manifest.json"
  seed: 42

augmentation:
  enabled: true
  time_warp_rate: 0.1
  amplitude_scale: 0.15
  noise_std: 0.05
  augment_factor: 2
  use_mixup: false
  mixup_alpha: 0.2
