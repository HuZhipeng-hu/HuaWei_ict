# ============================================
# NeuroGrip - Training Config
# ============================================

model:
  model_type: "standard"
  in_channels: 6
  num_classes: 6
  base_channels: 16
  use_se: true
  dropout_rate: 0.3

preprocess:
  sampling_rate: 200.0
  num_channels: 6
  total_channels: 8
  device_sampling_rate: 1000
  lowcut: 20.0
  highcut: 90.0
  filter_order: 4
  stft_window_size: 24
  stft_hop_size: 12
  stft_n_fft: 46
  segment_length: 84
  segment_stride: 42

training:
  epochs: 80
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_scheduler: "cosine"
  warmup_epochs: 3
  lr_step_size: 10
  lr_gamma: 0.5
  gradient_clip: 1.0
  label_smoothing: 0.1
  early_stop_patience: 12
  val_ratio: 0.2
  test_ratio: 0.2
  split_mode: "grouped_file"
  split_manifest_path: "artifacts/splits/default_split_manifest.json"
  split_seed: 42
  kfold: 0
  device: "Ascend"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# Canonical split config namespace (kept separate for clarity)
data:
  split_mode: "grouped_file"
  test_ratio: 0.2
  split_manifest_path: "artifacts/splits/default_split_manifest.json"
  seed: 42

augmentation:
  enabled: true
  time_warp_rate: 0.1
  amplitude_scale: 0.15
  noise_std: 0.05
  augment_factor: 5
  use_mixup: true
  mixup_alpha: 0.2
