# ============================================
# NeuroGrip - Runtime Config
# ============================================

model:
  model_type: "standard"
  in_channels: 6
  num_classes: 6
  base_channels: 16
  use_se: true
  dropout_rate: 0.0

preprocess:
  sampling_rate: 200.0
  num_channels: 6
  total_channels: 8
  lowcut: 20.0
  highcut: 90.0
  filter_order: 4
  stft_window_size: 24
  stft_hop_size: 12
  stft_n_fft: 46
  segment_length: 84
  segment_stride: 42

inference:
  model_path: "models/neurogrip.mindir"
  device: "Ascend"
  num_threads: 4

hardware:
  sensor_mode: "armband"
  sensor_port: null
  sensor_baudrate: 115200
  armband_sampling_rate: 1000
  sensor_buffer_size: 2000

  actuator_mode: "real"
  actuator_i2c_bus: 1
  actuator_i2c_address: 64
  actuator_frequency: 50

  servo_angle_open: 0.0
  servo_angle_half: 90.0
  servo_angle_closed: 180.0

vote_window_size: 5
vote_min_count: 3
confidence_threshold: 0.5

control_rate_hz: 30.0

runtime:
  infer_rate_hz: 0.0
